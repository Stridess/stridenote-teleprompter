plugins {
    id 'com.android.application'
}

android {
    namespace 'net.stridenote.teleprompter'
    compileSdk 34

    defaultConfig {
        applicationId "net.stridenote.teleprompter"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.11.0'
}
